<div class="login-container">
  <!-- Header -->
  <div class="login-header">
    <div class="login-logo">
      <img src="assets/logos/logo.png" alt="Logo de la empresa" class="logo-image">
    </div>
    <h1 class="login-title">Sistema de Inventario</h1>
    <p class="login-subtitle">Conservatorio del Huila</p>
  </div>

  <div class="login-box">
    <!-- Form Container -->
    <div class="login-form-container">
      <h2 class="login-form-title">Iniciar Sesión</h2>

      <!-- Error Message -->
      <div *ngIf="error" class="alert alert-error">
        <div class="alert-content">
          <span>{{ error }}</span>
        </div>
      </div>

      <!-- Success Message -->
      <div *ngIf="success" class="alert alert-success">
        <div class="alert-content">
          <span>{{ success }}</span>
        </div>
      </div>

      <!-- Login Form -->
      <form (ngSubmit)="login()" class="login-form">
        <!-- Username -->
        <div class="form-group">
          <label class="form-label">Usuario</label>
          <div class="input-wrapper" [class.has-error]="formSubmitted && !!usernameError">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </span>
            <input 
              type="text" 
              [(ngModel)]="username"
              name="username"
              class="form-input" 
              placeholder="Ingresa tu usuario"
              [disabled]="loading"
              (keypress)="onKeyPress($event)"
              autocomplete="username"
              [class.input-error]="formSubmitted && !!usernameError"
              required>
          </div>
          <span *ngIf="formSubmitted && !!usernameError" class="field-error">{{ usernameError }}</span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrapper" [class.has-error]="formSubmitted && !!passwordError">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
              </svg>
            </span>
            <input 
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              class="form-input" 
              placeholder="Ingresa tu contraseña"
              [disabled]="loading"
              (keypress)="onKeyPress($event)"
              autocomplete="current-password"
              [class.input-error]="formSubmitted && !!passwordError"
              required>
            <button 
              type="button" 
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [disabled]="loading"
              tabindex="-1"
              title="{{ showPassword ? 'Ocultar' : 'Mostrar' }} contraseña">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.58 10.58a2 2 0 1 0 2.83 2.83"></path>
                <path d="M9.88 5.09A11.2 11.2 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-4.22 5.22"></path>
                <path d="M6.61 6.61C4.13 8.26 2.7 10.8 2 12c0 0 3.5 7 10 7 1.59 0 3.02-.42 4.28-1.05"></path>
              </svg>
            </button>
          </div>
          <span *ngIf="formSubmitted && !!passwordError" class="field-error">{{ passwordError }}</span>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="btn-primary"
          [disabled]="loading">
          <span *ngIf="!loading" class="btn-text">
            Ingresar al Sistema
          </span>
          <span *ngIf="loading" class="btn-loading">
            <span class="spinner"></span>
            Autenticando...
          </span>
        </button>
      </form>

      <!-- Form Hint -->
      <!--<div class="form-hint" *ngIf="!loading && !error && !success">
        <p>Usuario Demo: <strong>maria</strong></p>
        <p>Contraseña: <strong>maria.1077224312</strong></p>
      </div>
      -->

    </div>
  </div>
</div>
